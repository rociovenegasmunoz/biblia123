<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Versículos Bíblicos</title>

<style>

body{
background:white;
color:black;
font-family: Arial, sans-serif;
text-align:center;
padding:40px;
}

#controles{
margin-bottom:40px;
}

input{
font-size:22px;
padding:12px;
width:260px;
}

button{
font-size:18px;
padding:10px 20px;
margin:10px;
cursor:pointer;
}

#verso{
font-size:60px;
margin-top:60px;
max-width:1000px;
margin-left:auto;
margin-right:auto;
line-height:1.4;
transition:font-size 0.3s;
}

#cita{
margin-top:40px;
font-size:28px;
opacity:0.8;
}

#volver{
position:fixed;
top:20px;
right:20px;
font-size:28px;
background:white;
border:none;
cursor:pointer;
display:none;
}

.proyeccion #controles{
display:none;
}

.proyeccion #volver{
display:block;
}

</style>
</head>

<body>

<button id="volver" onclick="salirProyeccion()">↩</button>

<div id="controles">

<h2>Buscar versículo</h2>

<input id="ref" placeholder="Ej: Juan 3:16">

<br>

<button onclick="buscar()">Buscar</button>
<button onclick="pantalla()">Pantalla completa</button>
<button onclick="modoProyeccion()">Modo proyección</button>

</div>

<div id="verso"></div>
<div id="cita"></div>

<script>

function ajustarTamano(texto){

let longitud = texto.length
let verso = document.getElementById("verso")

if(longitud < 120){
verso.style.fontSize = "60px"
}
else if(longitud < 250){
verso.style.fontSize = "46px"
}
else if(longitud < 400){
verso.style.fontSize = "36px"
}
else{
verso.style.fontSize = "28px"
}

}

function buscar(){

let ref = document.getElementById("ref").value.trim()

if(!ref) return

let url = "https://biblia-api.vercel.app/api/" + encodeURIComponent(ref)

fetch(url)

.then(res => res.json())

.then(data => {

if(data.text){

let texto = data.text

document.getElementById("verso").innerText = texto

document.getElementById("cita").innerText =
ref + " (RVR1960)"

ajustarTamano(texto)

}
else{

document.getElementById("verso").innerText =
"No se encontró el versículo"

document.getElementById("cita").innerText = ""

}

})

.catch(() => {

document.getElementById("verso").innerText =
"Error al buscar el versículo"

document.getElementById("cita").innerText = ""

})

}

function pantalla(){
document.documentElement.requestFullscreen()
}

function modoProyeccion(){
document.body.classList.add("proyeccion")
}

function salirProyeccion(){
document.body.classList.remove("proyeccion")
}

document.addEventListener("keydown", function(e){

if(e.key === "Enter") buscar()

if(e.key === "f") pantalla()

})

</script>

</body>
</html>
