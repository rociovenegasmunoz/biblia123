<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Versículos Bíblicos</title>

<style>

body{
background:white;
color:black;
font-family: Arial, sans-serif;
text-align:center;
padding:40px;
}

#controles{
margin-bottom:40px;
}

input{
font-size:22px;
padding:12px;
width:280px;
}

button{
font-size:18px;
padding:10px 20px;
margin:10px;
cursor:pointer;
}

#verso{
font-size:60px;
margin-top:60px;
max-width:1000px;
margin-left:auto;
margin-right:auto;
line-height:1.4;
transition:font-size 0.3s;
}

#cita{
margin-top:40px;
font-size:28px;
opacity:0.8;
}

#volver{
position:fixed;
top:20px;
right:20px;
font-size:28px;
background:white;
border:none;
cursor:pointer;
display:none;
}

.proyeccion #controles{
display:none;
}

.proyeccion #volver{
display:block;
}

</style>
</head>

<body>

<button id="volver" onclick="salirProyeccion()">↩</button>

<div id="controles">

<h2>Buscar versículo</h2>

<input id="ref" placeholder="Ej: Juan 3:16">

<br>

<button onclick="buscar()">Buscar</button>
<button onclick="pantalla()">Pantalla completa</button>
<button onclick="modoProyeccion()">Modo proyección</button>

</div>

<div id="verso"></div>
<div id="cita"></div>

<script>

/* Traducción de libros español → inglés */

const libros = {
"Juan":"John",
"Romanos":"Romans",
"Salmos":"Psalms",
"Génesis":"Genesis",
"Genesis":"Genesis",
"Mateo":"Matthew",
"Marcos":"Mark",
"Lucas":"Luke",
"Hechos":"Acts",
"1 Corintios":"1 Corinthians",
"2 Corintios":"2 Corinthians",
"Gálatas":"Galatians",
"Efesios":"Ephesians",
"Filipenses":"Philippians",
"Colosenses":"Colossians",
"Hebreos":"Hebrews",
"Santiago":"James",
"1 Pedro":"1 Peter",
"2 Pedro":"2 Peter",
"1 Juan":"1 John",
"2 Juan":"2 John",
"3 Juan":"3 John",
"Apocalipsis":"Revelation"
}

function traducir(ref){

for(let libro in libros){

if(ref.startsWith(libro)){

ref = ref.replace(libro, libros[libro])
break

}

}

return ref

}

function ajustarTamano(texto){

let longitud = texto.length
let verso = document.getElementById("verso")

if(longitud < 120){
verso.style.fontSize = "60px"
}
else if(longitud < 250){
verso.style.fontSize = "46px"
}
else if(longitud < 400){
verso.style.fontSize = "36px"
}
else{
verso.style.fontSize = "28px"
}

}

function buscar(){

let refOriginal = document.getElementById("ref").value.trim()

if(!refOriginal) return

let ref = traducir(refOriginal)

let url = "https://bible-api.deno.dev/api/read/RVR1960/" + encodeURIComponent(ref)

fetch(url)

.then(res => res.json())

.then(data => {

if(data.text){

let texto = data.text

document.getElementById("verso").innerText = texto
document.getElementById("cita").innerText = refOriginal + " (RVR1960)"

ajustarTamano(texto)

}else{

document.getElementById("verso").innerText = "No se encontró el versículo"
document.getElementById("cita").innerText = ""

}

})

.catch(() => {

document.getElementById("verso").innerText = "Error al buscar el versículo"
document.getElementById("cita").innerText = ""

})

}

function pantalla(){
document.documentElement.requestFullscreen()
}

function modoProyeccion(){
document.body.classList.add("proyeccion")
}

function salirProyeccion(){
document.body.classList.remove("proyeccion")
}

document.addEventListener("keydown", function(e){

if(e.key === "Enter") buscar()

if(e.key === "f") pantalla()

})

</script>

</body>
</html>
