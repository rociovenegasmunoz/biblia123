<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Versículos Bíblicos</title>

<style>

body{
background:white;
color:black;
font-family: Arial, sans-serif;
text-align:center;
padding:40px;
}

#controles{
margin-bottom:40px;
}

input{
font-size:22px;
padding:12px;
width:280px;
}

button{
font-size:18px;
padding:10px 20px;
margin:10px;
cursor:pointer;
}

#verso{
font-size:60px;
margin-top:60px;
max-width:1000px;
margin-left:auto;
margin-right:auto;
line-height:1.4;
transition:font-size 0.3s;
white-space:pre-line;
}

#cita{
margin-top:40px;
font-size:28px;
opacity:0.8;
}

#volver{
position:fixed;
top:20px;
right:20px;
font-size:28px;
background:white;
border:none;
cursor:pointer;
display:none;
}

.proyeccion #controles{
display:none;
}

.proyeccion #volver{
display:block;
}

</style>
</head>

<body>

<button id="volver" onclick="salirProyeccion()">↩</button>

<div id="controles">

<h2>Buscar versículo</h2>

<input id="ref" placeholder="Ej: Juan 3:16">

<br>

<button onclick="buscar()">Buscar</button>
<button onclick="pantalla()">Pantalla completa</button>
<button onclick="modoProyeccion()">Modo proyección</button>

</div>

<div id="verso"></div>
<div id="cita"></div>

<script>

/* traducción de libros español → inglés */

const libros = {
"Juan":"John",
"Romanos":"Romans",
"Salmos":"Psalms",
"Génesis":"Genesis",
"Mateo":"Matthew",
"Marcos":"Mark",
"Lucas":"Luke",
"Hechos":"Acts",
"Apocalipsis":"Revelation"
}

/* tamaño automático */

function ajustarTamano(texto){

let largo = texto.length
let v = document.getElementById("verso")

if(largo < 120) v.style.fontSize="60px"
else if(largo < 250) v.style.fontSize="46px"
else if(largo < 400) v.style.fontSize="36px"
else v.style.fontSize="28px"

}

/* traducir referencia */

function traducir(ref){

for(let libro in libros){

if(ref.startsWith(libro)){

ref = ref.replace(libro, libros[libro])
break

}

}

return ref

}

/* buscar versículo */

function buscar(){

let refOriginal = document.getElementById("ref").value.trim()

if(!refOriginal) return

let ref = traducir(refOriginal)

let url = "https://bible-api.com/" + encodeURIComponent(ref) + "?translation=rvr"

fetch(url)

.then(r => r.json())

.then(data => {

if(data.text){

let texto = data.text

document.getElementById("verso").innerText = texto
document.getElementById("cita").innerText = refOriginal + " (RVR)"

ajustarTamano(texto)

}else{

document.getElementById("verso").innerText = "No se encontró el versículo"
document.getElementById("cita").innerText = ""

}

})

.catch(() => {

document.getElementById("verso").innerText = "Error al buscar el versículo"
document.getElementById("cita").innerText = ""

})

}

/* pantalla completa */

function pantalla(){
document.documentElement.requestFullscreen()
}

/* modo proyección */

function modoProyeccion(){
document.body.classList.add("proyeccion")
}

function salirProyeccion(){
document.body.classList.remove("proyeccion")
}

/* atajos */

document.addEventListener("keydown", function(e){

if(e.key === "Enter") buscar()

if(e.key === "f") pantalla()

})

</script>

</body>
</html>
