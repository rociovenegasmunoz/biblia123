<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Versículos Bíblicos</title>

<style>

body{
background:white;
color:black;
font-family: "Helvetica Neue", Arial, sans-serif;
text-align:center;
padding:40px;
}

#controles{
margin-bottom:40px;
}

input{
font-size:22px;
padding:12px;
width:260px;
}

button{
font-size:18px;
padding:10px 20px;
margin:10px;
cursor:pointer;
}

#verso{
font-size:56px;
margin-top:60px;
max-width:1000px;
margin-left:auto;
margin-right:auto;
line-height:1.4;
}

#cita{
margin-top:40px;
font-size:26px;
opacity:0.8;
}

.proyeccion #controles{
display:none;
}

</style>
</head>

<body>

<div id="controles">

<h2>Buscar versículo</h2>

<input id="ref" placeholder="Ej: Juan 3:16">

<br>

<button onclick="buscar()">Buscar</button>
<button onclick="pantalla()">Pantalla completa</button>
<button onclick="modoProyeccion()">Modo proyección</button>

</div>

<div id="verso"></div>
<div id="cita"></div>

<script>

const libros = {
"Juan":"John",
"Romanos":"Romans",
"Salmos":"Psalms",
"Génesis":"Genesis",
"Genesis":"Genesis",
"Mateo":"Matthew",
"Marcos":"Mark",
"Lucas":"Luke",
"Hechos":"Acts",
"1 Corintios":"1 Corinthians",
"2 Corintios":"2 Corinthians",
"Gálatas":"Galatians",
"Efesios":"Ephesians",
"Filipenses":"Philippians",
"Colosenses":"Colossians",
"Hebreos":"Hebrews",
"Santiago":"James",
"1 Pedro":"1 Peter",
"2 Pedro":"2 Peter",
"1 Juan":"1 John",
"2 Juan":"2 John",
"3 Juan":"3 John",
"Apocalipsis":"Revelation"
}

let versiculoActual = ""
let numeroVersiculo = 0

function traducirReferencia(ref){

for(let libro in libros){

if(ref.startsWith(libro)){

ref = ref.replace(libro, libros[libro])
break

}

}

return ref

}

function buscar(){

let ref = document.getElementById("ref").value.trim()

ref = traducirReferencia(ref)

versiculoActual = ref

let refCodificada = encodeURIComponent(ref)

fetch("https://bible-api.com/" + refCodificada + "?translation=rvr1960")

.then(res => res.json())

.then(data => {

if(data.text){

document.getElementById("verso").innerText = data.text

document.getElementById("cita").innerText =
data.reference + " (RVR1960)"

let partes = data.reference.split(":")
numeroVersiculo = parseInt(partes[1])

}else{

document.getElementById("verso").innerText =
data.error || "No se encontró el versículo"

document.getElementById("cita").innerText = ""

}

})

.catch(() => {

document.getElementById("verso").innerText =
"Error al buscar el versículo"

document.getElementById("cita").innerText = ""

})

}

function siguiente(){

if(!versiculoActual) return

let partes = versiculoActual.split(":")

let libroCap = partes[0]
numeroVersiculo++

let nuevo = libroCap + ":" + numeroVersiculo

document.getElementById("ref").value = nuevo

buscar()

}

function anterior(){

if(!versiculoActual) return

let partes = versiculoActual.split(":")

let libroCap = partes[0]
numeroVersiculo--

if(numeroVersiculo < 1) return

let nuevo = libroCap + ":" + numeroVersiculo

document.getElementById("ref").value = nuevo

buscar()

}

function pantalla(){

document.documentElement.requestFullscreen()

}

function modoProyeccion(){

document.body.classList.toggle("proyeccion")

}

document.addEventListener("keydown", function(e){

if(e.key === "Enter") buscar()

if(e.key === "ArrowRight") siguiente()

if(e.key === "ArrowLeft") anterior()

if(e.key === "f") pantalla()

})

</script>

</body>
</html>
