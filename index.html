<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Biblia Proyector</title>

<style>

body{
font-family:Arial;
margin:0;
text-align:center;
background:#111;
color:white;
transition:.3s;
}

body.claro{
background:white;
color:black;
}

#buscador{
padding:20px;
background:#222;
}

body.claro #buscador{
background:#eee;
}

input{
padding:10px;
font-size:18px;
width:230px;
}

button{
padding:10px 15px;
font-size:16px;
margin:5px;
cursor:pointer;
}

#resultado{
padding:30px;
}

#cita{
font-size:20px;
opacity:.7;
}

#verso{
margin-top:20px;
font-size:46px;
line-height:1.5;
max-width:900px;
margin:auto;
}

.palabras-jesus{
color:#d22;
font-weight:bold;
}

/* PROYECTOR */

#proyector{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
color:white;
}

#proyectorContenedor{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:85%;
max-height:90vh;
overflow:hidden;
}

#proyectorVerso{
line-height:1.4;
}

#proyectorCita{
margin-top:30px;
font-size:30px;
opacity:.7;
}

#volver{
position:fixed;
top:20px;
right:30px;
font-size:45px;
cursor:pointer;
z-index:100;
}

</style>
</head>

<body>

<div id="buscador">

<h2>Biblia</h2>

<input id="ref" placeholder="Ej: hechos 1:4">

<button onclick="buscar()">Buscar</button>

<button onclick="modoProyector()">Proyectar</button>

<button onclick="modoColor()">Claro/Oscuro</button>

</div>

<div id="resultado">

<div id="cita"></div>

<div id="verso"></div>

</div>


<div id="proyector">

<div id="volver" onclick="salirProyector()">↩</div>

<div id="proyectorContenedor">

<div id="proyectorVerso"></div>

<div id="proyectorCita"></div>

</div>

</div>


<script>

function normalizarLibro(nombre){

nombre = nombre.toLowerCase()

nombre = nombre.replace("á","a")
nombre = nombre.replace("é","e")
nombre = nombre.replace("í","i")
nombre = nombre.replace("ó","o")
nombre = nombre.replace("ú","u")

nombre = nombre.replace(" ","_")

return nombre

}


/* DETECTAR PALABRAS DE JESÚS */

function procesarVersiculo(texto){

let resultado=""
let rojo=false

for(let c of texto){

if(c=="_"){

if(rojo){
resultado+="</span>"
}else{
resultado+="<span class='palabras-jesus'>"
}

rojo=!rojo
continue
}

resultado+=c

}

return resultado

}



async function buscar(){

let ref=document.getElementById("ref").value.trim()

if(!ref) return

let partes=ref.split(" ")

let libro=normalizarLibro(partes[0])

let capVers=partes[1].split(":")

let capitulo=parseInt(capVers[0])-1

let versiculo=capVers[1]

let rango=versiculo.split("-")

let vInicio=parseInt(rango[0])-1
let vFin=rango[1]?parseInt(rango[1])-1:vInicio

let archivo="biblia/"+libro+".json"

try{

let res=await fetch(archivo)
let data=await res.json()

let cap=data[capitulo]

let texto=""

for(let i=vInicio;i<=vFin;i++){

let v=cap[i]

texto+="<b>"+(i+1)+".</b> "+procesarVersiculo(v)+"<br><br>"

}

document.getElementById("verso").innerHTML=texto

document.getElementById("cita").innerText=ref+" (RVR1960)"

}catch{

document.getElementById("verso").innerText="Error al buscar versículo"
document.getElementById("cita").innerText=""

}

}



/* MODO PROYECTOR */

function modoProyector(){

let verso=document.getElementById("verso").innerHTML
let cita=document.getElementById("cita").innerText

if(!verso) return

document.getElementById("proyectorVerso").innerHTML=verso
document.getElementById("proyectorCita").innerText=cita

document.getElementById("proyector").style.display="block"

ajustarTamano()

}



function ajustarTamano(){

let texto=document.getElementById("proyectorVerso")
let cont=document.getElementById("proyectorContenedor")

let size=120

texto.style.fontSize=size+"px"

while(texto.scrollHeight>cont.clientHeight){

size-=2
texto.style.fontSize=size+"px"

if(size<20) break

}

}



function salirProyector(){

document.getElementById("proyector").style.display="none"

}



/* MODO CLARO / OSCURO */

function modoColor(){

document.body.classList.toggle("claro")

}



/* ATAJOS DE TECLADO */

document.addEventListener("keydown",function(e){

if(e.key==="Enter"){
buscar()
}

if(e.key==="p"||e.key==="P"){
modoProyector()
}

if(e.key==="Escape"){
salirProyector()
}

})

</script>

</body>
</html>
