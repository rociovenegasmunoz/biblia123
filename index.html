<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Versículos Bíblicos</title>

<style>

body{
background:white;
color:black;
font-family: "Georgia", serif;
text-align:center;
padding:40px;
}

input{
font-size:20px;
padding:10px;
width:200px;
}

button{
font-size:18px;
padding:10px 20px;
margin:10px;
}

#verso{
font-size:42px;
margin-top:60px;
max-width:900px;
margin-left:auto;
margin-right:auto;
}

#cita{
margin-top:30px;
font-size:22px;
}

</style>
</head>

<body>

<h2>Buscar versículo</h2>

<input id="ref" placeholder="Ej: Juan 3:16">

<br>

<button onclick="buscar()">Buscar</button>
<button onclick="pantalla()">Pantalla completa</button>

<div id="verso"></div>
<div id="cita"></div>

<script>

  const libros = {
"Juan":"John",
"Romanos":"Romans",
"Salmos":"Psalms",
"Génesis":"Genesis",
"Genesis":"Genesis",
"Mateo":"Matthew",
"Marcos":"Mark",
"Lucas":"Luke",
"Hechos":"Acts",
"1 Corintios":"1 Corinthians",
"2 Corintios":"2 Corinthians",
"Gálatas":"Galatians",
"Efesios":"Ephesians",
"Filipenses":"Philippians",
"Colosenses":"Colossians",
"Hebreos":"Hebrews",
"Santiago":"James",
"1 Pedro":"1 Peter",
"2 Pedro":"2 Peter",
"1 Juan":"1 John",
"2 Juan":"2 John",
"3 Juan":"3 John",
"Apocalipsis":"Revelation"
}

function buscar(){

let ref = document.getElementById("ref").value.trim()

for (let libro in libros){
if(ref.startsWith(libro)){
ref = ref.replace(libro, libros[libro])
break
}
}

let refCodificada = encodeURIComponent(ref)

fetch("https://bible-api.com/" + refCodificada + "?translation=rvr1960")
.then(res => res.json())
.then(data => {

if(data.text){

document.getElementById("verso").innerText = data.text
document.getElementById("cita").innerText = data.reference + " (RVR1960)"

}else{

document.getElementById("verso").innerText = data.error || "No se encontró el versículo"
document.getElementById("cita").innerText = ""

}

})

}

})
.catch(error => {

document.getElementById("verso").innerText = "Error al buscar el versículo"
document.getElementById("cita").innerText = ""

})

}

function pantalla(){

document.documentElement.requestFullscreen()

}

</script>

</body>
</html>
