<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Biblia Proyector</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
margin:0;
text-align:center;
}

#buscador{
padding:20px;
background:#222;
}

input{
padding:10px;
font-size:18px;
width:220px;
}

button{
padding:10px 15px;
font-size:16px;
margin:5px;
cursor:pointer;
}

#resultado{
padding:30px;
}

#cita{
font-size:20px;
opacity:.8;
}

#verso{
margin-top:20px;
font-size:48px;
line-height:1.5;
max-width:900px;
margin-left:auto;
margin-right:auto;
white-space:pre-line;
}

/* PROYECTOR */

#proyector{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
color:white;
overflow:hidden;
}

#proyectorContenedor{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:85%;
max-height:90vh;
overflow:hidden;
}

#proyectorVerso{
white-space:pre-line;
line-height:1.4;
}

#proyectorCita{
margin-top:30px;
font-size:30px;
opacity:.7;
}

/* botón volver */

#volver{
position:fixed;
top:20px;
right:30px;
font-size:45px;
cursor:pointer;
z-index:10;
}

</style>
</head>

<body>

<div id="buscador">

<h2>Biblia</h2>

<input id="ref" placeholder="Ej: juan 3:16">

<button onclick="buscar()">Buscar</button>

<button onclick="modoProyector()">Proyectar</button>

</div>


<div id="resultado">

<div id="cita"></div>

<div id="verso"></div>

</div>


<div id="proyector">

<div id="volver" onclick="salirProyector()">↩</div>

<div id="proyectorContenedor">

<div id="proyectorVerso"></div>

<div id="proyectorCita"></div>

</div>

</div>



<script>

function normalizarLibro(nombre){

nombre = nombre.toLowerCase()

nombre = nombre.replace("á","a")
nombre = nombre.replace("é","e")
nombre = nombre.replace("í","i")
nombre = nombre.replace("ó","o")
nombre = nombre.replace("ú","u")

nombre = nombre.replace(" ","_")

return nombre

}



async function buscar(){

let ref = document.getElementById("ref").value.trim()

if(!ref) return

let partes = ref.split(" ")

let libro = normalizarLibro(partes[0])

let capVers = partes[1].split(":")

let capitulo = parseInt(capVers[0]) - 1

let versiculo = capVers[1]

let rango = versiculo.split("-")

let vInicio = parseInt(rango[0]) - 1

let vFin = rango[1] ? parseInt(rango[1]) - 1 : vInicio

let archivo = "biblia/" + libro + ".json"

try{

let res = await fetch(archivo)

let data = await res.json()

let cap = data[capitulo]

let texto = ""

for(let i=vInicio;i<=vFin;i++){

let v = cap[i].replace(/^_+|_+$/g,"")

texto += (i+1) + ". " + v + "\n\n"

}

document.getElementById("verso").innerText = texto

document.getElementById("cita").innerText = ref + " (RVR1960)"

}catch{

document.getElementById("verso").innerText = "Error al buscar el versículo"

document.getElementById("cita").innerText = ""

}

}



function modoProyector(){

let verso = document.getElementById("verso").innerText
let cita = document.getElementById("cita").innerText

if(!verso) return

document.getElementById("proyectorVerso").innerText = verso
document.getElementById("proyectorCita").innerText = cita

document.getElementById("proyector").style.display = "block"

ajustarTamanoProyector()

}



function ajustarTamanoProyector(){

let texto = document.getElementById("proyectorVerso")
let contenedor = document.getElementById("proyectorContenedor")

let size = 120

texto.style.fontSize = size + "px"

while(texto.scrollHeight > contenedor.clientHeight){

size -= 2

texto.style.fontSize = size + "px"

if(size < 20) break

}

}



function salirProyector(){

document.getElementById("proyector").style.display = "none"

}

</script>

</body>
</html>
